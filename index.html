<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Вітаємо на сайті уроку</title>
	<link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
<!-- 

Сайт з реєстрецією та логіном + адаптивна трохи верстка

Треба форма логін + пароль + кнопка логін (показувати лише коли не залогінені)
зберігати пароль в браузері
форма реєстрації (показувати лише коли не залогінені)

if else, querySelector
array, object
localstorage
можливо валідація (hi-to-all@gmail.com.)

user name, login, password (required)
hidden/showed passwoord
date of birth
man/woman
--  додати фото з диску (компʼютер)



 -->

<!-- Форма логіну -->
<div id="loginForm">
	<h2>Вітаємо, вкажіть логін та пароль</h2>
	<p></p>
	<form action="/login" method="POST">
		<input id="login" type="text" name="login" required placeholder="Логін">
		<input id="password" type="password" name="password" required placeholder="Пароль">
		<input type="submit" class="apply-form" value="Залогінитися">
	</form>
</div>
<!-- end Форма логіну -->

<!-- Форма реєстрації -->
<div id="registration">
	<form>
		<input type="text" name="login" required placeholder="Логін">
		<input type="password" name="password" required placeholder="Пароль">
		<input type="text" name="name" placeholder="Імʼя" value="Іван">
		<input type="submit" class="apply-form" value="Реєстрація">
	</form>
</div>
<!-- end Форма реєстрації -->

<script src="script.js"></script>
</body>
</html>
